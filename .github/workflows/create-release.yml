name: Create release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      upload_url: ${{ steps.rp.outputs.upload_url }}
    steps:
      - name: Release please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

  build-upload:
    name: Build and upload
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Prepare package name
        id: prepare
        run: |
          PKG_NAME=$(echo "${{ github.event.repository.name }}" | sed -e 's|\.|_|g')
          VERSION=$(echo "${{ needs.release.outputs.tag_name }}" | sed -e 's|^v||')
          echo "package=$PKG_NAME-$VERSION" >> $GITHUB_OUTPUT
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Create archive
        run: tar -czvf ${{ steps.prepare.outputs.package }}.tar.gz -C ./dist .
      - name: Upload archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag_name }} \
            ./${{ steps.prepare.outputs.package }}.tar.gz
